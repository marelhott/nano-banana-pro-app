<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0f0d" />
  <title>Mulen nano</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Internal:wght@100&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@100..800&display=swap"
    rel="stylesheet">
  <script>
    (() => {
      const storageKey = 'mulen-theme';
      const fallback = 'dark';
      const stored = window.localStorage.getItem(storageKey);
      const theme = stored === 'light' || stored === 'dark' ? stored : fallback;
      document.documentElement.dataset.theme = theme;
      document.documentElement.style.colorScheme = theme;
    })();
  </script>
  <style>
    :root {
      --app-bg: #0a0f0d;
      --app-bg-alt: #0f1512;
      --app-text: #f3f4f6;
      --app-dot: rgba(255, 255, 255, 0.06);
      --app-border: rgba(255, 255, 255, 0.1);
      --font-ui: 'Calling Code', 'JetBrains Mono', monospace;
    }

    :root[data-theme='light'] {
      --app-bg: #f5f7f2;
      --app-bg-alt: #fcfffa;
      --app-text: #132219;
      --app-dot: rgba(46, 148, 93, 0.12);
      --app-border: rgba(19, 34, 25, 0.12);
      --font-ui: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    }

    html {
      background-color: var(--app-bg) !important;
      color-scheme: light dark;
    }

    body {
      font-family: var(--font-ui) !important;
      background-color: var(--app-bg) !important;
      background-image: radial-gradient(var(--app-dot) 1px, transparent 1px);
      background-size: 24px 24px;
      color: var(--app-text);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      transition: background-color 0.25s ease, color 0.25s ease;
    }

    /* Refined custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #89cba0;
      border-radius: 20px;
      border: 2px solid var(--app-bg);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #56b07a;
    }

    @keyframes slideUpFade {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fadeIn {
      animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fade {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .animate-fade {
      animation: fade 0.3s ease-out forwards;
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #b8e0c4;
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #89cba0;
    }

    /* Transitions for interactive elements */
    button,
    input,
    select,
    textarea,
    .card {
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Force high-quality image rendering */
    img {
      image-rendering: -webkit-optimize-contrast;
      image-rendering: high-quality;
      -ms-interpolation-mode: bicubic;
      /* Prevent browser downsampling */
      transform: translateZ(0);
      backface-visibility: hidden;
      -webkit-font-smoothing: subpixel-antialiased;
    }

    /* Gallery thumbnails - force full quality */
    article img {
      will-change: auto;
      transform: translateZ(0);
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.29.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "jszip": "https://esm.run/jszip"
  }
}
</script>
</head>

<body class="overflow-hidden">
  <div id="root">

          <circle cx="50" cy="30" r="2" fill="#6b7280" />

          <circle cx="36" cy="64" r="2" fill="#6b7280" />
          <circle cx="30" cy="50" r="2" fill="#6b7280" />
          <circle cx="36" cy="36" r="2" fill="#6b7280" />

          <circle cx="50" cy="20" r="1.5" fill="#374151" />

      </div>
    </div>

  <script type="module" src="/index.tsx"></script>
</body>

</html>
