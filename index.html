<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b0c0a" />
  <title>Mulen nano</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />

  <link rel="preload" href="/fonts/hankengrotesk.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/instrumentserif.woff2" as="font" type="font/woff2" crossorigin>
  <script>
    (() => {
      const storageKey = 'mulen-theme';
      const fallback = 'dark';
      const stored = window.localStorage.getItem(storageKey);
      const theme = stored === 'light' || stored === 'dark' ? stored : fallback;
      document.documentElement.dataset.theme = theme;
      document.documentElement.style.colorScheme = theme;
    })();
  </script>
  <style>
    :root {
      --app-bg: #0b0c0a;
      --app-bg-alt: #101210;
      --app-text: #f2f4ec;
      --app-dot: rgba(244, 246, 238, 0.05);
      --app-border: rgba(244, 246, 238, 0.14);
      --font-ui: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    :root[data-theme='light'] {
      --app-bg: #f2f4ec;
      --app-bg-alt: #fafbf6;
      --app-text: #131510;
      --app-dot: rgba(125, 154, 100, 0.14);
      --app-border: rgba(19, 21, 16, 0.1);
      --font-ui: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html {
      background-color: var(--app-bg) !important;
      color-scheme: light dark;
    }

    body {
      font-family: var(--font-ui) !important;
      background-color: var(--app-bg) !important;
      background-image: radial-gradient(var(--app-dot) 1px, transparent 1px);
      background-size: 24px 24px;
      color: var(--app-text);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
      transition: background-color 0.25s cubic-bezier(0.16, 1, 0.3, 1), color 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Refined custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #a8bf8f;
      border-radius: 20px;
      border: 2px solid var(--app-bg);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #7d9a64;
    }

    @keyframes slideUpFade {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fadeIn {
      animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fade {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .animate-fade {
      animation: fade 0.3s ease-out forwards;
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #b8caa0;
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #a8bf8f;
    }

    /* Transitions for interactive elements */
    button,
    input,
    select,
    textarea,
    .card {
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Force high-quality image rendering */
    img {
      image-rendering: -webkit-optimize-contrast;
      image-rendering: high-quality;
      -ms-interpolation-mode: bicubic;
      /* Prevent browser downsampling */
      transform: translateZ(0);
      backface-visibility: hidden;
      -webkit-font-smoothing: subpixel-antialiased;
    }

    /* Gallery thumbnails - force full quality */
    article img {
      will-change: auto;
      transform: translateZ(0);
    }
  </style>
  <script type="importmap">
{

</head>

<body class="overflow-hidden">

  <script type="module" src="/index.tsx"></script>

  <!-- Cairn glass cursor tracker -->
  <script>
    (function() {
      const cursor = document.getElementById('cairn-cursor');
      if (!cursor) return;
      let raf, cx = -100, cy = -100, tx = -100, ty = -100;
      const lerp = (a, b, t) => a + (b - a) * t;
      document.addEventListener('mousemove', e => { tx = e.clientX; ty = e.clientY; });
      document.addEventListener('mouseenter', () => cursor.classList.add('visible'));
      document.addEventListener('mouseleave', () => cursor.classList.remove('visible'));
      // scale up on interactive elements
      document.addEventListener('mouseover', e => {
        if (e.target.closest('button,a,input,select,textarea,[role="button"],[tabindex]')) {
          cursor.style.width = '52px'; cursor.style.height = '52px';
          cursor.style.margin = '-26px 0 0 -26px';
        } else {
          cursor.style.width = ''; cursor.style.height = ''; cursor.style.margin = '';
        }
      });
      function tick() {
        cx = lerp(cx, tx, 0.18);
        cy = lerp(cy, ty, 0.18);
        cursor.style.transform = `translate3d(${cx}px, ${cy}px, 0)`;
        raf = requestAnimationFrame(tick);
      }
      tick();
      cursor.classList.add('visible');
    })();
  </script>
</body>

</html>
