[build]
  command = "npm ci && npm run build"
  publish = "dist"
  # Updated: 2026-01-05 - pravý panel fix

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

[functions]
  directory = "netlify/functions"

# Production deploy from main branch
[context.production]
  command = "npm ci && npm run build"
  publish = "dist"

# Branch deploys (for testing)
[context.branch-deploy]
  command = "npm ci && npm run build"
  publish = "dist"

[[redirects]]
  from = "/nodes"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/nodes/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/api/replicate/predictions"
  to = "/.netlify/functions/replicate-predictions"
  status = 200
  force = true

[[redirects]]
  from = "/api/replicate/predictions/*"
  to = "/.netlify/functions/replicate-predictions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/provider-key-test"
  to = "/.netlify/functions/provider-key-test"
  status = 200
  force = true

[[redirects]]
  from = "/api/fal/lora-img2img"
  to = "/.netlify/functions/fal-lora-img2img"
  status = 200
  force = true

[[redirects]]
  from = "/api/public-config"
  to = "/.netlify/functions/public-config"
  status = 200
  force = true

[[redirects]]
  from = "/api/pin-auth"
  to = "/.netlify/functions/pin-auth"
  status = 200
  force = true

[[redirects]]
  from = "/api/r2-presign"
  to = "/.netlify/functions/r2-presign"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api-not-found"
  status = 404
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
